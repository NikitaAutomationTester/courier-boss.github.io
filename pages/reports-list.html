<div id="reportsListPage" style="display: none">
  <div class="reports-header">
    <button class="back-button" id="backFromReportsList">← Назад</button>
    <h2>Мои отчёты</h2>
  </div>

  <!-- Компактный блок фильтрации -->
  <div class="reports-filter">
    <div class="filter-tabs">
      <button class="filter-tab" data-filter="week">За неделю</button>
      <button class="filter-tab" data-filter="month">За месяц</button>
      <button class="filter-tab" data-filter="all">Все</button>
      <button class="filter-tab" id="showPeriodBtn">За период</button>
    </div>

    <!-- Блок выбора периода (скрыт по умолчанию) -->
    <div class="period-panel" id="periodPanel" style="display: none">
      <div
        class="period-mobile-stack"
        style="display: flex; flex-direction: column; gap: 12px; width: 100%"
      >
        <div style="width: 100%">
          <div class="period-label" style="margin-bottom: 4px">С</div>
          <input
            type="date"
            id="dateFrom"
            class="date-input-small"
            style="
              width: 100%;
              box-sizing: border-box;
              padding: 12px;
              border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
              border-radius: 8px;
              font-size: 16px;
            "
          />
        </div>
        <div style="width: 100%">
          <div class="period-label" style="margin-bottom: 4px">По</div>
          <input
            type="date"
            id="dateTo"
            class="date-input-small"
            style="
              width: 100%;
              box-sizing: border-box;
              padding: 12px;
              border: 1px solid var(--tg-theme-hint-color, #e0e0e0);
              border-radius: 8px;
              font-size: 16px;
            "
          />
        </div>
      </div>
      <button
        class="apply-btn"
        id="applyPeriod"
        style="
          width: 100%;
          padding: 12px;
          margin-top: 16px;
          background-color: var(--tg-theme-button-color, #40a7e3);
          color: white;
          border: none;
          border-radius: 8px;
          font-size: 14px;
          font-weight: 500;
          cursor: pointer;
        "
      >
        Применить
      </button>
    </div>
  </div>

  <!-- Контейнер для списка отчётов -->
  <div id="reportsList" class="reports-list">
    <!-- Сюда будут добавляться отчёты через JavaScript -->
  </div>
</div>
