<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Отчёт курьера</title>
    <script src="https://unpkg.com/@max.me/telegram-web-app@1.0.0/dist/web-app.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@max.me/max-ui@latest/dist/max-ui.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Отчёт за день</h1>

      <!-- Поле для выбора даты -->
      <div class="form-group">
        <label for="report-date">Выберите дату</label>
        <div class="date-control">
          <input type="date" id="report-date" />
          <div
            class="date-display"
            id="report-date-display"
            aria-hidden="true"
          ></div>
        </div>
        <div class="date-quick-actions" aria-label="Быстрый выбор даты">
          <button type="button" class="date-quick-btn" data-offset="0">
            Сегодня
          </button>
          <button type="button" class="date-quick-btn" data-offset="-1">
            Вчера
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Клиники, которые я посетил(а):</label>
        <div id="clinics-list" class="clinics-grid">
          <div class="loading">Загрузка списка...</div>
        </div>
      </div>

      <div class="bottom-actions" id="bottom-actions">
        <div class="salary-row" id="salary-row">
          <span class="salary-label">Зарплата за день:</span>
          <span class="salary-amount-inline" id="total-salary">0 ₽</span>
        </div>

        <button
          type="button"
          id="add-extra-delivery-btn"
          class="max-button add-extra-delivery-cta"
        >
          Добавить доставку
        </button>

        <button
          id="save-report-btn"
          class="max-button max-button--primary"
          disabled
        >
          Отправить отчёт
        </button>
      </div>
    </div>

    <!-- Модальное окно добавления доставки (bottom-sheet для мобильных) -->
    <div class="modal-backdrop" id="extra-delivery-modal-backdrop" hidden>
      <div
        class="modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="extra-delivery-modal-title"
      >
        <div class="modal-header">
          <div class="modal-title" id="extra-delivery-modal-title">
            Добавить доставку
          </div>
          <button
            type="button"
            class="modal-close"
            id="extra-delivery-modal-close"
            aria-label="Закрыть"
          >
            ✕
          </button>
        </div>

        <div class="modal-body">
          <div class="form-group form-group--inner">
            <label for="extra-modal-receive">Адрес получения груза</label>
            <input
              id="extra-modal-receive"
              class="max-input"
              type="text"
              inputmode="text"
              autocomplete="off"
            />
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-modal-deliver"
              >Адрес доставки груза (обязательно)</label
            >
            <input
              id="extra-modal-deliver"
              class="max-input"
              type="text"
              inputmode="text"
              autocomplete="off"
            />
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-modal-comment">Комментарии</label>
            <textarea
              id="extra-modal-comment"
              class="max-input"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-modal-salary"
              >Зарплата (обязательно, целое число)</label
            >
            <input
              id="extra-modal-salary"
              class="max-input"
              type="number"
              step="1"
              inputmode="numeric"
            />
          </div>
        </div>

        <div class="modal-footer">
          <button
            type="button"
            class="max-button"
            id="extra-delivery-modal-cancel"
          >
            Отмена
          </button>
          <button
            type="button"
            class="max-button max-button--primary"
            id="extra-delivery-modal-add"
          >
            Добавить
          </button>
        </div>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
