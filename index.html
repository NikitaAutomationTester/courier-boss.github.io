<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <title>Отчёт курьера</title>
    <script src="https://unpkg.com/@max.me/telegram-web-app@1.0.0/dist/web-app.js"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/@max.me/max-ui@latest/dist/max-ui.css"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Отчёт за день</h1>

      <!-- Поле для выбора даты -->
      <div class="form-group">
        <label for="report-date">Выберите дату</label>
        <div class="date-control">
          <input type="date" id="report-date" />
          <div
            class="date-display"
            id="report-date-display"
            aria-hidden="true"
          ></div>
        </div>
        <div class="date-quick-actions" aria-label="Быстрый выбор даты">
          <button type="button" class="date-quick-btn" data-offset="0">
            Сегодня
          </button>
          <button type="button" class="date-quick-btn" data-offset="-1">
            Вчера
          </button>
        </div>
      </div>

      <!-- Дополнительная доставка (не связана с клиниками) -->
      <div class="form-group">
        <label class="toggle-row">
          <input
            type="checkbox"
            id="extra-delivery-toggle"
            aria-controls="extra-delivery-form"
          />
          Есть дополнительная доставка
        </label>

        <div class="extra-delivery-form" id="extra-delivery-form" hidden>
          <div class="form-group form-group--inner">
            <label for="extra-delivery-receive">Адрес получения груза</label>
            <input
              id="extra-delivery-receive"
              class="max-input"
              type="text"
              inputmode="text"
              autocomplete="off"
            />
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-delivery-deliver">Адрес доставки груза</label>
            <input
              id="extra-delivery-deliver"
              class="max-input"
              type="text"
              inputmode="text"
              autocomplete="off"
            />
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-delivery-comment">Комментарии</label>
            <textarea
              id="extra-delivery-comment"
              class="max-input"
              rows="3"
            ></textarea>
          </div>

          <div class="form-group form-group--inner">
            <label for="extra-delivery-salary">Зарплата</label>
            <input
              id="extra-delivery-salary"
              class="max-input"
              type="number"
              step="1"
              inputmode="numeric"
            />
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Клиники, которые я посетил(а):</label>
        <div id="clinics-list" class="clinics-grid">
          <div class="loading">Загрузка списка...</div>
        </div>
      </div>

      <div class="bottom-actions" id="bottom-actions">
        <div class="salary-row" id="salary-row">
          <span class="salary-label">Зарплата за день:</span>
          <span class="salary-amount-inline" id="total-salary">0 ₽</span>
        </div>

        <button
          id="save-report-btn"
          class="max-button max-button--primary"
          disabled
        >
          Отправить отчёт
        </button>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
